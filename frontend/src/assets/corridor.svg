<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Минималистичный интерьер коридора</title>
  <desc>Минималистичный коридор с деревянной скамейкой, зеркалом и дверью</desc>

  <defs>
    <clipPath id="mirrorClip">
      <rect x="80" y="130" width="110" height="160" rx="4"/>
    </clipPath>
  </defs>

  <!-- Floor -->
  <polygon points="0,520 680,520 560,340 120,340" fill="#D4C5A9"/>
  <line x1="120" y1="340" x2="0" y2="520" stroke="#C2AF90" stroke-width="1"/>
  <line x1="210" y1="340" x2="130" y2="520" stroke="#C2AF90" stroke-width="1"/>
  <line x1="300" y1="340" x2="265" y2="520" stroke="#C2AF90" stroke-width="1"/>
  <line x1="390" y1="340" x2="400" y2="520" stroke="#C2AF90" stroke-width="1"/>
  <line x1="470" y1="340" x2="530" y2="520" stroke="#C2AF90" stroke-width="1"/>
  <line x1="560" y1="340" x2="680" y2="520" stroke="#C2AF90" stroke-width="1"/>

  <!-- Back wall -->
  <rect x="120" y="60" width="440" height="280" fill="#F0EAE0"/>

  <!-- Left wall -->
  <polygon points="0,0 120,60 120,340 0,520" fill="#E2D9CC"/>

  <!-- Right wall -->
  <polygon points="680,0 560,60 560,340 680,520" fill="#D8CFBF"/>

  <!-- Ceiling -->
  <polygon points="0,0 680,0 560,60 120,60" fill="#EDE8E0"/>

  <!-- Baseboards -->
  <polygon points="0,500 120,330 120,340 0,520" fill="#C5B99A"/>
  <polygon points="680,500 560,330 560,340 680,520" fill="#B8AC94"/>
  <rect x="120" y="330" width="440" height="10" fill="#C8BEA8"/>

  <!-- Ceiling cornice -->
  <polygon points="0,8 680,8 560,68 120,68" fill="#DDD7CC"/>

  <!-- Back door -->
  <rect x="280" y="130" width="120" height="210" rx="2" fill="#C4A882"/>
  <rect x="285" y="135" width="110" height="200" rx="2" fill="#D4B896"/>
  <rect x="292" y="145" width="44" height="80" rx="2" fill="#C8AA84" stroke="#B89468" stroke-width="0.8"/>
  <rect x="344" y="145" width="44" height="80" rx="2" fill="#C8AA84" stroke="#B89468" stroke-width="0.8"/>
  <rect x="292" y="238" width="44" height="86" rx="2" fill="#C8AA84" stroke="#B89468" stroke-width="0.8"/>
  <rect x="344" y="238" width="44" height="86" rx="2" fill="#C8AA84" stroke="#B89468" stroke-width="0.8"/>
  <circle cx="333" cy="240" r="4" fill="#A08050"/>
  <rect x="329" y="240" width="12" height="3" rx="1.5" fill="#A08050"/>
  <rect x="276" y="126" width="128" height="218" rx="2" fill="none" stroke="#B8A080" stroke-width="4"/>

  <!-- Mirror (left wall) -->
  <rect x="78" y="128" width="114" height="164" rx="3" fill="#9BA8A0" opacity="0.25"/>
  <rect x="80" y="130" width="110" height="160" rx="2" fill="#C8D4CE" opacity="0.6"/>
  <rect x="80" y="130" width="110" height="160" rx="2" fill="#D8E2DC" opacity="0.5" clip-path="url(#mirrorClip)"/>
  <polygon points="80,290 190,290 160,200 110,200" fill="#E0E8E4" opacity="0.4" clip-path="url(#mirrorClip)"/>
  <rect x="78" y="128" width="114" height="164" rx="3" fill="none" stroke="#8C7A5E" stroke-width="4"/>
  <rect x="82" y="132" width="106" height="156" rx="2" fill="none" stroke="#A89270" stroke-width="1.5"/>

  <!-- Wall lamp -->
  <rect x="54" y="100" width="6" height="22" rx="2" fill="#A89270"/>
  <ellipse cx="57" cy="100" rx="14" ry="6" fill="#D4BC96"/>
  <ellipse cx="57" cy="99" rx="11" ry="4" fill="#F0DDB8" opacity="0.8"/>

  <!-- Right wall decorative lines -->
  <line x1="580" y1="100" x2="640" y2="120" stroke="#C8BEA8" stroke-width="1"/>
  <line x1="580" y1="160" x2="640" y2="185" stroke="#C8BEA8" stroke-width="1"/>
  <line x1="580" y1="220" x2="640" y2="248" stroke="#C8BEA8" stroke-width="1"/>

  <!-- Wooden bench -->
  <polygon points="88,330 260,318 260,308 88,320" fill="#8B6640"/>
  <rect x="88" y="320" width="172" height="10" rx="2" fill="#9C7650"/>
  <polygon points="82,320 266,307 266,312 82,325" fill="#B08860"/>
  <rect x="96" y="330" width="10" height="25" rx="2" fill="#7A5530"/>
  <rect x="240" y="320" width="10" height="25" rx="2" fill="#7A5530"/>
  <rect x="96" y="346" width="154" height="4" rx="2" fill="#6A4520"/>
  <line x1="100" y1="321" x2="100" y2="323" stroke="#9C7650" stroke-width="0.8"/>
  <line x1="130" y1="319" x2="130" y2="321" stroke="#9C7650" stroke-width="0.8"/>
  <line x1="160" y1="317" x2="160" y2="320" stroke="#9C7650" stroke-width="0.8"/>
  <line x1="200" y1="315" x2="200" y2="318" stroke="#9C7650" stroke-width="0.8"/>
  <line x1="240" y1="313" x2="240" y2="316" stroke="#9C7650" stroke-width="0.8"/>

  <!-- Small plant on bench -->
  <rect x="224" y="300" width="18" height="16" rx="2" fill="#8B6640"/>
  <rect x="222" y="298" width="22" height="5" rx="1" fill="#7A5530"/>
  <ellipse cx="233" cy="285" rx="12" ry="16" fill="#5A8A4A"/>
  <ellipse cx="225" cy="290" rx="7" ry="12" fill="#4A7A3A"/>
  <ellipse cx="242" cy="288" rx="7" ry="13" fill="#6A9A5A"/>

  <!-- Umbrella stand -->
  <rect x="540" y="300" width="18" height="42" rx="3" fill="#8C7A5E"/>
  <ellipse cx="549" cy="300" rx="10" ry="4" fill="#A08A6E"/>
  <line x1="545" y1="298" x2="542" y2="220" stroke="#4A6A8A" stroke-width="3" stroke-linecap="round"/>
  <line x1="549" y1="296" x2="550" y2="215" stroke="#8A4A4A" stroke-width="3" stroke-linecap="round"/>
  <line x1="553" y1="298" x2="557" y2="218" stroke="#4A6A4A" stroke-width="3" stroke-linecap="round"/>

  <!-- Floor shadow -->
  <ellipse cx="175" cy="355" rx="100" ry="8" fill="#B8A888" opacity="0.3"/>
</svg>
